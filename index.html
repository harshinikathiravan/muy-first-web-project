<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinterest Header</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top-header">
      <div class="left-section">
        <a href="#" class="logo">Pinterest</a>
        <a href="#" class="explore-link">Explore</a>
      </div>

      <div class="search-section">
        <input
          type="text"
          placeholder="Search for easy dinners, fashion, etc."
        />
      </div>

      <nav class="right-section">
        <a href="#">About</a>
        <a href="#">Businesses</a>
        <a href="#">Create</a>
        <a href="#">News</a>
      </nav>

      <div class="auth-buttons">
        <button class="login-btn">Log in</button>
        <button class="signup-btn">Sign up</button>
      </div>
    </header>

   <!-- Section 1 -->
<div class="section1">
  <div class="page">
    <h1 class="head">Bring your favorite ideas to life</h1>
    <p class="para">
      With Pinterest, you can unlock tools that spark your creativity and help you find more inspiration.
    </p>
  </div>
</div>

<!-- Section 2 -->
<div class="section2">
  <div class="content">
    <img src="https://i.pinimg.com/originals/31/e8/45/31e8455b6b965b1b93b35c0b4466f836.png" class="image"/>

    <div class="text">
      <h1 class="head">Search by skin tone</h1>
      <p class="para">
        Search with skin tone ranges for beauty ideas that represent you
      </p>
      <button class="button">Try now</button>
    </div>
  </div>
</div>

</body>
</html>
